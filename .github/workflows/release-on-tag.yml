name: Release Firmware on Tag

on:
  push:
    tags:
      - 'v*.*.*.*'
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Strip any suffix (e.g., -beta, -rc1)
          VERSION_CLEAN="${VERSION%%-*}"

          # Detect pre-release (tag contains hyphen after version)
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
            CHANNEL="beta"
          else
            IS_PRERELEASE=false
            CHANNEL="stable"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

          # Convert version to hex for fileVersion (use clean version for numbers)
          IFS='.' read -r major minor patch <<< "$VERSION_CLEAN"
          if [ -z "$patch" ]; then patch=0; fi

          # Calculate hex fileVersion: (major << 16) | (minor << 8) | patch
          # Format: 0x00MMNNPP where MM=major, NN=minor, PP=patch
          file_version_dec=$((major * 65536 + minor * 256 + patch))
          file_version=$(printf "0x%08x" $file_version_dec)

          echo "major=${major}" >> $GITHUB_OUTPUT
          echo "minor=${minor}" >> $GITHUB_OUTPUT
          echo "patch=${patch}" >> $GITHUB_OUTPUT
          echo "file_version_hex=${file_version}" >> $GITHUB_OUTPUT
          echo "file_version_dec=${file_version_dec}" >> $GITHUB_OUTPUT

          echo "📦 Release version: ${VERSION}"
          echo "📦 Version (clean): ${VERSION_CLEAN}"
          echo "📦 Channel: ${CHANNEL}"
          echo "🔢 File version (hex): ${file_version}"
          echo "🔢 File version (dec): ${file_version_dec}"

      - name: Validate version in code
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          MINOR="${{ steps.version.outputs.minor }}"
          PATCH="${{ steps.version.outputs.patch }}"

          # Check main/version.h for version component constants
          if ! grep -q "#define FW_VERSION_MAJOR ${MAJOR}" main/version.h; then
            echo "❌ ERROR: FW_VERSION_MAJOR mismatch in main/version.h"
            echo "Expected: #define FW_VERSION_MAJOR ${MAJOR}"
            echo "Please update main/version.h to match tag ${GITHUB_REF#refs/tags/}"
            exit 1
          fi

          if ! grep -q "#define FW_VERSION_MINOR ${MINOR}" main/version.h; then
            echo "❌ ERROR: FW_VERSION_MINOR mismatch in main/version.h"
            echo "Expected: #define FW_VERSION_MINOR ${MINOR}"
            echo "Please update main/version.h to match tag ${GITHUB_REF#refs/tags/}"
            exit 1
          fi

          if ! grep -q "#define FW_VERSION_PATCH ${PATCH}" main/version.h; then
            echo "❌ ERROR: FW_VERSION_PATCH mismatch in main/version.h"
            echo "Expected: #define FW_VERSION_PATCH ${PATCH}"
            echo "Please update main/version.h to match tag ${GITHUB_REF#refs/tags/}"
            exit 1
          fi

          echo "✅ Version validated: FW_VERSION_MAJOR=${MAJOR} MINOR=${MINOR} PATCH=${PATCH}"

      - name: Install ESP-IDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
            python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
            libusb-1.0-0

      - name: Clone ESP-IDF
        run: |
          git clone --recursive --branch v5.5.2 --depth 1 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32h2,esp32c6

      - name: Clone ESP Zigbee SDK
        run: |
          cd esp-idf/..
          git clone --recursive --branch main --depth 1 https://github.com/espressif/esp-zigbee-sdk.git
          ls -la esp-zigbee-sdk/tools/image_builder_tool/

      - name: Build firmware (H2)
        run: |
          . esp-idf/export.sh
          idf.py -B build_h2 set-target esp32h2
          idf.py -B build_h2 build

          echo "✅ H2 firmware built"
          ls -lh build_h2/zb_led_controller.bin

      - name: Build firmware (C6)
        run: |
          . esp-idf/export.sh
          idf.py -B build_c6 set-target esp32c6
          idf.py -B build_c6 build

          echo "✅ C6 firmware built"
          ls -lh build_c6/zb_led_controller.bin

      - name: Install zigpy for OTA image creation
        run: |
          python3 -m pip install zigpy

      - name: Create OTA images
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION_HEX="${{ steps.version.outputs.file_version_hex }}"

          python3 esp-zigbee-sdk/tools/image_builder_tool/image_builder_tool.py \
            -v ${FILE_VERSION_HEX} \
            -m 0x131B \
            -i 0x0002 \
            --tag 0 build_h2/zb_led_controller.bin
          mv 131B-0002-*-ota-file.zigbee zb_led_controller_v${VERSION}.ota

          python3 esp-zigbee-sdk/tools/image_builder_tool/image_builder_tool.py \
            -v ${FILE_VERSION_HEX} \
            -m 0x131B \
            -i 0x0004 \
            --tag 0 build_c6/zb_led_controller.bin
          mv 131B-0004-*-ota-file.zigbee zb_led_ctrl_c6_v${VERSION}.ota

          echo "✅ OTA images created"
          ls -lh zb_led_controller_v${VERSION}.ota zb_led_ctrl_c6_v${VERSION}.ota

      - name: Generate release notes
        id: release_notes
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "First release - no previous tag found"
            NOTES="Initial release"
          else
            echo "Generating changelog from ${PREVIOUS_TAG} to ${GITHUB_REF#refs/tags/}"
            NOTES=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          # Save to file for multiline output
          echo "${NOTES}" > release_notes.txt
          echo "notes_file=release_notes.txt" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"
          CHANNEL="${{ steps.version.outputs.channel }}"

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" \
            zb_led_controller_v${VERSION}.ota \
            zb_led_ctrl_c6_v${VERSION}.ota \
            --title "ZB-H2-LED ${TAG} [${CHANNEL}]" \
            --notes-file ${{ steps.release_notes.outputs.notes_file }} \
            ${PRERELEASE_FLAG}

          echo "✅ GitHub release created: ${TAG} (${CHANNEL})"

      - name: Update OTA index
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          FILE_VERSION_DEC="${{ steps.version.outputs.file_version_dec }}"

          # Update OTA index — H2 (imageType 2) + C6 (imageType 4)
          cat > z2m/ota_index.json <<EOF
          [
            {
              "manufacturerCode": 4891,
              "imageType": 2,
              "fileVersion": ${FILE_VERSION_DEC},
              "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/zb_led_controller_v${VERSION}.ota"
            },
            {
              "manufacturerCode": 4891,
              "imageType": 4,
              "fileVersion": ${FILE_VERSION_DEC},
              "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/zb_led_ctrl_c6_v${VERSION}.ota"
            }
          ]
          EOF

          echo "✅ OTA index updated"
          cat z2m/ota_index.json

      - name: Commit and push OTA index
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            BRANCH="dev"
          else
            BRANCH="master"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch and checkout the target branch (workflow runs in detached HEAD at tag commit)
          git fetch origin ${BRANCH}
          git checkout ${BRANCH}
          git pull origin ${BRANCH}

          git add z2m/ota_index.json
          git diff --staged --quiet || git commit -m "chore: update ${CHANNEL} OTA index for ${TAG}"
          git push origin ${BRANCH}

          echo "✅ OTA index committed and pushed to ${BRANCH} (${CHANNEL})"

      - name: Trigger OTA index aggregator
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/ShaunPCcom/zigbee-ota-index/dispatches \
            -d '{"event_type":"update-index","client_payload":{"repository":"zigbee-LED-ESP32-controller","version":"'"${VERSION}"'"}}'

          echo "✅ Triggered OTA index aggregator update"

      - name: Release Summary
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"
          echo "🎉 Release Complete!"
          echo ""
          echo "📦 Version: ${{ steps.version.outputs.version }}"
          echo "🏷️  Tag: ${{ steps.version.outputs.tag }}"
          echo "📡 Channel: ${CHANNEL}"
          echo "📄 H2 OTA: zb_led_controller_v${{ steps.version.outputs.version }}.ota (imageType 0x0002)"
          echo "📄 C6 OTA: zb_led_ctrl_c6_v${{ steps.version.outputs.version }}.ota (imageType 0x0004)"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          echo ""
          if [ "$CHANNEL" = "beta" ]; then
            echo "Beta testers: point Z2M OTA index to the dev branch z2m/ota_index.json"
          else
            echo "Users will be notified of the update within 24 hours (or on manual check)."
          fi
